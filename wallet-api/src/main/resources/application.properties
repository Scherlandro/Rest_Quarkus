
quarkus.datasource.db-kind=mysql
quarkus.datasource.db-version=5.7.0
quarkus.datasource.username=root
quarkus.datasource.password=84505050
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/bionaturatec

#quarkus.swagger-ui.always-include=true
quarkus.openapi.management.swagger-ui.always-include=true

quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET, POST, PUT, DELETE

quarkus.http.cors.max-age=86400S
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

quarkus.http.auth.permission.basic-or-bearer.paths=/service
quarkus.http.auth.permission.basic-or-bearer.policy=authenticated

quarkus.http.auth.permission.basic.paths=/basic-only
quarkus.http.auth.permission.basic.policy=authenticated
quarkus.http.auth.permission.basic.auth-mechanism=basic

quarkus.http.auth.permission.bearer.paths=/bearer-only
quarkus.http.auth.permission.bearer.policy=authenticated
quarkus.http.auth.permission.bearer.auth-mechanism=bearer


# SmallRye JWT configuration
mp.jwt.verify.publickey.location=classpath:META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://example.com/issuer
quarkus.http.auth.proactive=true

